/**
 * Netlify Deployment Configuration
 * 
 * 部署配置:
 * - 构建命令和发布目录
 * - 安全头部
 * - 重定向规则
 * - 函数配置
 */

[build]
  # 构建命令
  command = "pnpm build"
  
  # 发布目录
  publish = "dist"
  
  # 环境变量
  [build.environment]
    NODE_VERSION = "20"
    PNPM_VERSION = "8"

# Netlify Functions配置
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 重定向规则
[[redirects]]
  # API路由重定向到Netlify Functions
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  # SPA后备路由
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin", "staff"]}

# 安全头部
[[headers]]
  for = "/*"
  [headers.values]
    # XSS保护
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    
    # CSP (Content Security Policy)
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: https: blob:;
      font-src 'self' data: https://fonts.gstatic.com;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    """
    
    # 引荐来源策略
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # 权限策略
    Permissions-Policy = """
      geolocation=(),
      microphone=(),
      camera=(self),
      payment=(),
      usb=(),
      magnetometer=(),
      gyroscope=(),
      accelerometer=()
    """

# 静态资源缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML文件不缓存
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 插件配置
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  
  [plugins.inputs]
    # Lighthouse性能监控
    performance = 90
    accessibility = 90
    best-practices = 90
    seo = 90

